# HEMS Dispatch — X-Plane Native Plugin Configuration
# This file configures the connection to the Local Bridge v2 server.
# Place this file alongside the plugin .xpl in:
#   <X-Plane>/Resources/plugins/hems_dispatch/hems_bridge.ini

[bridge]
# Host and port of the Local Bridge v2 server
host=localhost
port=8080

# Telemetry endpoint path on the bridge
path=/telemetry

# Send rate in Hz (1 = once per second, max recommended)
send_rate_hz=1
