# HEMS Dispatch — MSFS SimConnect Plugin Configuration
# This file configures the connection to the Local Bridge v2 server.
# Place this file alongside HEMS_Dispatch_MSFS.exe

[bridge]
# Host and port of the Local Bridge v2 server
host=localhost
port=8080

# Telemetry endpoint path on the bridge
path=/telemetry

# Send rate in Hz (1 = once per second, max recommended)
send_rate_hz=1
