name: Electron Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    env:
      VITE_AZURE_B2C_CLIENT_ID: ${{ secrets.VITE_AZURE_B2C_CLIENT_ID }}
      VITE_AZURE_B2C_AUTHORITY: ${{ secrets.VITE_AZURE_B2C_AUTHORITY }}
      VITE_AZURE_B2C_KNOWN_AUTHORITY: ${{ secrets.VITE_AZURE_B2C_KNOWN_AUTHORITY }}
      VITE_AZURE_API_SCOPE: ${{ secrets.VITE_AZURE_API_SCOPE }}
      VITE_AZURE_API_BASE_URL: ${{ secrets.VITE_AZURE_API_BASE_URL }}
      VITE_AZURE_SIGNALR_ENDPOINT: ${{ secrets.VITE_AZURE_SIGNALR_ENDPOINT }}
      VITE_AZURE_STORAGE_URL: ${{ secrets.VITE_AZURE_STORAGE_URL }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install --legacy-peer-deps
      - run: npm run electron:build:win
      - uses: actions/upload-artifact@v4
        with:
          name: electron-windows
          path: release/*.exe
          retention-days: 30

  build-macos:
    name: Build macOS (arm64 + x64)
    runs-on: macos-latest
    env:
      VITE_AZURE_B2C_CLIENT_ID: ${{ secrets.VITE_AZURE_B2C_CLIENT_ID }}
      VITE_AZURE_B2C_AUTHORITY: ${{ secrets.VITE_AZURE_B2C_AUTHORITY }}
      VITE_AZURE_B2C_KNOWN_AUTHORITY: ${{ secrets.VITE_AZURE_B2C_KNOWN_AUTHORITY }}
      VITE_AZURE_API_SCOPE: ${{ secrets.VITE_AZURE_API_SCOPE }}
      VITE_AZURE_API_BASE_URL: ${{ secrets.VITE_AZURE_API_BASE_URL }}
      VITE_AZURE_SIGNALR_ENDPOINT: ${{ secrets.VITE_AZURE_SIGNALR_ENDPOINT }}
      VITE_AZURE_STORAGE_URL: ${{ secrets.VITE_AZURE_STORAGE_URL }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install --legacy-peer-deps
      - run: npm run electron:build:mac
      - uses: actions/upload-artifact@v4
        with:
          name: electron-macos
          path: release/*.dmg
          retention-days: 30

  publish-release:
    name: Publish GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/electron-windows/*.exe
            artifacts/electron-macos/*.dmg
          generate_release_notes: true
          draft: false
          prerelease: false
